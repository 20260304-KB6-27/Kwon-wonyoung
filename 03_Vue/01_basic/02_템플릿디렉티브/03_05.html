<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h2>취미생활</h2>
      <input type="checkbox" v-model="hobby" value="A"/>운동
      <input type="checkbox" v-model="hobby" value="B"/>독서
      <input type="checkbox" v-model="hobby" value="C"/>음악
      <input type="checkbox" v-model="hobby" value="D"/>댄스
      <input type="checkbox" v-model="hobby" value="E"/>역사
      <h2>상품 분류 선택</h2>
      <select v-model="category">
        <option value="C01">가전</option>
        <option value="C02">가구</option>
        <option value="C03">음식</option>
        <option value="C04">의류</option>
        <option value="C05">기타</option>
      </select>
      <hr>
      <div>선택한 취미: {{hobby.toString()}}</div>
      <div>선택한 상품 분류: {{category}}</div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const hobby = ref([]);
          const category = ref('');
          return {
            hobby,
            category,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
