<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      table {
        border: solid black;
      }

      th, td {
        border: solid black;
      }

      #head {
        background-color: purple;
        color: yellow;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <table>
        <tr id="head">
          <th>번호</th>
          <th>이름</th>
          <th>전화번호</th>
        </tr>
        <tr v-for="(contact, index) in contacts" :key="index">
          <td>{{index + 1}}</td>
          <td>{{contact.name}}</td>
          <td>{{contact.tel}}</td>
        </tr>
      </table>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {

          const contacts = ref([
            { no: 1011, name: 'RM', tel: '010-3456-8299' },
            { no: 1012, name: '정국', tel: '010-3456-8298' },
            { no: 1013, name: '제이홉', tel: '010-3456-8297' },
            { no: 1014, name: '슈가', tel: '010-3456-8296' },
          ]);
          return {
            contacts
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
