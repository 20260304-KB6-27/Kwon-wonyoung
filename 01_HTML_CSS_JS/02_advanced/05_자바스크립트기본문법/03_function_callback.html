<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      function callTimes(callback, N){
        for(let i=0; i < N; i++){
            callback();
        }
      }

      let fun = function(){
        alert('함수 호출');
      }

      callTimes(fun, 3);
      
    </script>
  </head>
  <body></body>
</html>
